<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:#0f172a;min-height:100vh;color:#f1f5f9;}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e293b);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:#1e293b;border-radius:20px;padding:32px 24px;width:100%;max-width:360px;border:1px solid #334155;}
.login-title{font-size:22px;font-weight:800;color:#f1f5f9;text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:24px;}
.login-input{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:14px;font-size:15px;color:#f1f5f9;font-family:inherit;outline:none;margin-bottom:10px;}
.login-btn-main{width:100%;background:#7c3aed;color:white;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
.login-err{display:none;color:#f87171;font-size:13px;text-align:center;margin-top:8px;}
/* HEADER */
.header{background:linear-gradient(135deg,#1e1b4b,#3730a3,#7c3aed);padding:16px 20px;}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:18px;font-weight:800;color:white;}
.header .sub{font-size:12px;color:rgba(255,255,255,0.7);margin-top:3px;}
.logout-btn{background:rgba(220,38,38,0.2);border:1px solid rgba(220,38,38,0.4);border-radius:8px;padding:6px 12px;color:#f87171;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
/* TABS */
.tabs{display:flex;background:#1e293b;border-bottom:2px solid #334155;overflow-x:auto;}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:700;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab.on{color:#7c3aed;border-bottom-color:#7c3aed;}
/* STATS CARDS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;}
.stat-card{background:#1e293b;border-radius:12px;padding:16px;border:1px solid #334155;}
.stat-num{font-size:28px;font-weight:800;}
.stat-label{font-size:12px;color:#64748b;margin-top:4px;}
.stat-green{color:#16a34a;}
.stat-blue{color:#2563eb;}
.stat-purple{color:#7c3aed;}
.stat-orange{color:#f59e0b;}
/* ORDERS */
.wrap{max-width:500px;margin:0 auto;padding:10px 14px 80px;}
.card{background:#1e293b;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #334155;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.card-name{font-size:14px;font-weight:800;color:#f1f5f9;}
.card-date{font-size:11px;color:#64748b;}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.b-offen{background:#fef3c7;color:#b45309;}
.b-ok{background:#d1fae5;color:#065f46;}
.b-err{background:#fee2e2;color:#dc2626;}
.type-tag{font-size:11px;font-weight:700;margin-top:4px;}
.t-lager{color:#16a34a;}
.t-airside{color:#2563eb;}
.t-al{color:#7c3aed;}
/* FILTER */
.filter-bar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;background:#1e293b;border-bottom:1px solid #334155;}
.filter-btn{padding:6px 14px;border:1.5px solid #334155;border-radius:20px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;background:transparent;color:#64748b;white-space:nowrap;}
.filter-btn.on{background:#7c3aed;color:white;border-color:#7c3aed;}
/* ARTICLES */
.art-section{background:#1e293b;border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid #334155;}
.art-section-head{padding:10px 14px;font-size:12px;font-weight:800;color:white;background:linear-gradient(135deg,#1e1b4b,#3730a3);}
.art-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #334155;}
.art-row:last-child{border-bottom:none;}
.art-img{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.art-ph{width:40px;height:40px;border-radius:8px;background:#334155;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.art-name{flex:1;font-size:13px;font-weight:700;color:#f1f5f9;}
.art-unit{font-size:11px;color:#64748b;}
.art-type{font-size:10px;color:#7c3aed;font-weight:700;}
/* LIVE DOT */
.live-dot{width:8px;height:8px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.empty{text-align:center;padding:40px 20px;color:#64748b;}

.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 0;}
.status-card{background:#1e293b;border-radius:12px;padding:14px;border:1px solid #334155;display:flex;align-items:center;gap:12px;}
.status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.status-dot.green{background:#16a34a;box-shadow:0 0 8px #16a34a;}
.status-dot.red{background:#dc2626;box-shadow:0 0 8px #dc2626;}
.status-dot.checking{background:#f59e0b;animation:pulse 1s infinite;}
.status-label{font-size:13px;font-weight:700;color:#f1f5f9;}
.status-sub{font-size:11px;color:#64748b;margin-top:2px;}

.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 0;}.status-card{background:#1e293b;border-radius:12px;padding:14px;border:1px solid #334155;display:flex;align-items:center;gap:12px;}.status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}.status-dot.green{background:#16a34a;box-shadow:0 0 8px #16a34a;}.status-dot.red{background:#dc2626;box-shadow:0 0 8px #dc2626;}.status-dot.checking{background:#f59e0b;animation:blink 1s infinite;}@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}.status-label{font-size:13px;font-weight:700;color:#f1f5f9;}.status-sub{font-size:11px;color:#64748b;margin-top:2px;}
.delivery-stats{background:#1e293b;border-radius:14px;margin:0 14px 14px;padding:16px;border:1px solid #334155;}
.delivery-stats-title{font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
.delivery-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #334155;}
.delivery-row:last-child{border-bottom:none;}
.delivery-label{font-size:13px;color:#94a3b8;}
.delivery-val{font-size:14px;font-weight:800;color:#f1f5f9;}
.delivery-val.good{color:#16a34a;}
.delivery-val.warn{color:#f59e0b;}
.delivery-val.bad{color:#dc2626;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">👑 Owner</div>
    <div class="login-sub">bona'me Dashboard</div>
    <input type="email" id="login-email" class="login-input" placeholder="Email" onkeydown="if(event.key==='Enter')doLogin()"/>
    <input type="password" id="login-pw" class="login-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn-main" onclick="doLogin()">🔐 Anmelden</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>👑 Owner Dashboard</h1>
      <div class="sub"><span class="live-dot"></span>Live · bona'me × Lagardère</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab on" id="tab-overview" onclick="showTab('overview')">📊 Übersicht</div>
  <div class="tab" id="tab-orders" onclick="showTab('orders')">📋 Bestellungen</div>
  <div class="tab" id="tab-articles" onclick="showTab('articles')">📦 Artikel</div>
</div>

<!-- OVERVIEW -->
<div id="page-overview">
  
  <div class="status-grid">
    <div class="status-card"><div class="status-dot checking" id="status-dot-db"></div><div><div class="status-label">Supabase DB</div><div class="status-sub" id="status-text-db">Prüfe...</div></div></div>
    <div class="status-card"><div class="status-dot checking" id="status-dot-netlify"></div><div><div class="status-label">Netlify</div><div class="status-sub" id="status-text-netlify">Prüfe...</div></div></div>
    <div class="status-card"><div class="status-dot checking" id="status-dot-orders"></div><div><div class="status-label">Bestellungen</div><div class="status-sub" id="status-text-orders">Prüfe...</div></div></div>
    <div class="status-card"><div class="status-dot checking" id="status-dot-articles"></div><div><div class="status-label">Artikel</div><div class="status-sub" id="status-text-articles">Prüfe...</div></div></div>
  </div>

<div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-num stat-orange" id="stat-open">-</div><div class="stat-label">Offene Bestellungen</div></div>
    <div class="stat-card"><div class="stat-num stat-green" id="stat-done">-</div><div class="stat-label">Heute erledigt</div></div>
    <div class="stat-card"><div class="stat-num stat-blue" id="stat-today">-</div><div class="stat-label">Heute gesamt</div></div>
    <div class="stat-card"><div class="stat-num stat-purple" id="stat-articles">-</div><div class="stat-label">Artikel gesamt</div></div>
  </div>
  <div class="wrap" id="recent-orders"></div>
</div>

<!-- ORDERS -->
<div id="page-orders" style="display:none;">
  <div class="filter-bar">
    <button class="filter-btn on" id="fo-all" onclick="setOrderFilter('all')">Alle</button>
    <button class="filter-btn" id="fo-lager" onclick="setOrderFilter('lager')">📦 Landside→Lager</button>
    <button class="filter-btn" id="fo-airside" onclick="setOrderFilter('airside')">✈️ Landside→Airside</button>
    <button class="filter-btn" id="fo-al" onclick="setOrderFilter('airside_lager')">🔄 Airside→Lager</button>
    <button class="filter-btn" id="fo-done" onclick="setOrderFilter('done')">✅ Erledigt</button>
  </div>
  <div class="wrap" id="orders-list"></div>
</div>

<!-- ARTICLES -->
<div id="page-articles" style="display:none;">
  <div class="filter-bar">
    <button class="filter-btn on" id="fa-all" onclick="setArticleFilter('all')">Alle</button>
    <button class="filter-btn" id="fa-lager" onclick="setArticleFilter('lager')">📦 Lager</button>
    <button class="filter-btn" id="fa-airside" onclick="setArticleFilter('airside')">✈️ Airside</button>
    <button class="filter-btn" id="fa-al" onclick="setArticleFilter('airside_lager')">🔄 Airside→Lager</button>
  </div>
  <div style="padding:10px 14px;background:#1e293b;border-bottom:1px solid #334155;">
    <input type="text" id="art-search" placeholder="🔍 Artikel oder Kategorie suchen..." 
      oninput="searchArticlesDash(this.value)"
      style="width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:10px 14px;font-size:14px;color:#f1f5f9;font-family:inherit;outline:none;"/>
  </div>
  <div class="wrap">
    <div style="background:#1e293b;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid #334155;">
      <div style="font-size:13px;font-weight:800;color:#f1f5f9;margin-bottom:10px;">➕ Neuen Artikel hinzufügen</div>
      <input type="text" id="new-art-name" placeholder="Artikelname" style="width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:9px;padding:10px;font-size:14px;color:#f1f5f9;font-family:inherit;outline:none;margin-bottom:8px;"/>
      <input type="text" id="new-art-unit" placeholder="Einheit (z.B. 1 KG, 6x2KG)" style="width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:9px;padding:10px;font-size:14px;color:#f1f5f9;font-family:inherit;outline:none;margin-bottom:8px;"/>
      <select id="new-art-type" onchange="populateSectionSelect()" style="width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:9px;padding:10px;font-size:14px;color:#f1f5f9;font-family:inherit;outline:none;margin-bottom:8px;">
        <option value="">-- Seite wählen --</option>
        <option value="lager">📦 Landside → Lager</option>
        <option value="airside">✈️ Landside → Airside</option>
        <option value="airside_lager">🔄 Airside → Lager</option>
      </select>
      <select id="new-art-section" style="width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:9px;padding:10px;font-size:14px;color:#f1f5f9;font-family:inherit;outline:none;margin-bottom:8px;">
        <option value="">-- Kategorie wählen --</option>
      </select>
      <div id="new-cat-wrap-dash" style="display:none;margin-bottom:8px;">
        <input type="text" id="new-cat-input-dash" placeholder="z.B. 🥗 Salate" style="width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:9px;padding:10px;font-size:14px;color:#f1f5f9;font-family:inherit;outline:none;"/>
      </div>
      <button onclick="addArticleDash()" style="width:100%;background:#7c3aed;color:white;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;">✅ Artikel hinzufügen</button>
    </div>
    <div id="articles-list"></div>
  </div>
</div>

<script>
const SB_URL="https://xltsjtbbbykftmjkhcjm.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsdHNqdGJiYnlrZnRtamtoY2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NzIyNzAsImV4cCI6MjA5NDM0ODI3MH0.-2f3zJpA-8-KhNrpse5gBBH6wTEa7sR0DN36AOBFkss";
const H={"apikey":SB_KEY,"Content-Type":"application/json"};

let allOrders=[], allArticles=[], orderFilter='all', articleFilter='all';

async function api(method,table,query="",body=null){
  try{
    const token=localStorage.getItem('dash_token');
    const headers={...H};
    if(token) headers['Authorization']='Bearer '+token;
    const o={method,headers};
    if(body) o.body=JSON.stringify(body);
    const r=await fetch(`${SB_URL}/rest/v1/${table}${query}`,o);
    if(!r.ok) return null;
    if(method==="DELETE") return true;
    return await r.json();
  }catch(e){return null;}
}

// ─── LOGIN ───────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const err=document.getElementById('login-err');
  if(!email||!pw){err.style.display='block';err.textContent='❌ Bitte Email und Passwort eingeben.';return;}
  try{
    const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pw})
    });
    const data=await r.json();
    if(data.access_token){
      localStorage.setItem('dash_token',data.access_token);
      localStorage.setItem('dash_session',(Date.now()+30*24*3600000).toString());
      document.getElementById('login-screen').style.display='none';
      loadAll();
    }else{
      err.style.display='block';err.textContent='❌ Falsche Email oder Passwort';
    }
  }catch(e){err.style.display='block';err.textContent='❌ Verbindungsfehler';}
}

function doLogout(){
  localStorage.removeItem('dash_token');
  localStorage.removeItem('dash_session');
  location.reload();
}

// ─── TABS ─────────────────────────────────────────────────
function showTab(tab){
  ['overview','orders','articles'].forEach(t=>{
    document.getElementById('page-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('on',t===tab);
  });
  if(tab==='orders') renderOrders();
  if(tab==='articles') renderArticles();
}

// ─── LOAD ALL ─────────────────────────────────────────────
async function loadAll(){
  const [orders,articles]=await Promise.all([
    api("GET","orders","?order=created_at.desc"),
    api("GET","articles","?order=type.asc,section.asc,name.asc")
  ]);
  allOrders=orders||[];
  allArticles=articles||[];
  renderOverview();
}

// ─── OVERVIEW ────────────────────────────────────────────
function renderOverview(){
  const now=new Date();
  const todayStr=now.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}).split('.').slice(0,2).join('.');
  const open=allOrders.filter(o=>!['angekommen','fehler'].includes(o.status));
  const done=allOrders.filter(o=>['angekommen','fehler'].includes(o.status)&&o.date&&o.date.includes(todayStr));
  const todayAll=allOrders.filter(o=>o.date&&o.date.includes(todayStr));
  
  document.getElementById('stat-open').textContent=open.length;
  document.getElementById('stat-done').textContent=done.length;
  document.getElementById('stat-today').textContent=todayAll.length;
  document.getElementById('stat-articles').textContent=allArticles.length;
  
  // Calculate delivery times
  calcDeliveryTimes(done);
  
  // Recent orders
  const el=document.getElementById('recent-orders');
  const recent=allOrders.slice(0,10);
  if(!recent.length){el.innerHTML='<div class="empty">📭 Keine Bestellungen</div>';return;}
  el.innerHTML='<div style="font-size:13px;font-weight:700;color:#64748b;margin-bottom:10px;">Letzte Bestellungen</div>'+
    recent.map(o=>orderCard(o)).join('');
}

// ─── ORDERS ──────────────────────────────────────────────
function setOrderFilter(f){
  orderFilter=f;
  ['all','lager','airside','al','done'].forEach(k=>{
    document.getElementById('fo-'+k)?.classList.toggle('on',k===f||(k==='al'&&f==='airside_lager'));
  });
  renderOrders();
}

function renderOrders(){
  const el=document.getElementById('orders-list');
  const isDone=orderFilter==='done';
  let filtered=allOrders.filter(o=>{
    if(isDone) return ['angekommen','fehler'].includes(o.status);
    if(orderFilter==='all') return !['angekommen','fehler'].includes(o.status);
    return o.type===orderFilter&&!['angekommen','fehler'].includes(o.status);
  });
  if(!filtered.length){el.innerHTML='<div class="empty">📭 Keine Bestellungen</div>';return;}
  el.innerHTML=filtered.map(o=>orderCard(o)).join('');
}

function orderCard(o){
  const sl={offen:'⏳ Offen',bestaetigt:'✅ Bestätigt',unterwegs:'🚗 Unterwegs',angekommen:'✅ Erledigt',fehler:'⚠️ Fehlt'}[o.status]||'Offen';
  const sc={offen:'b-offen',bestaetigt:'b-ok',unterwegs:'b-ok',angekommen:'b-ok',fehler:'b-err'}[o.status]||'b-offen';
  const typeMap={lager:'📦 Landside→Lager',airside:'✈️ Landside→Airside',airside_lager:'🔄 Airside→Lager'};
  const typeClass={lager:'t-lager',airside:'t-airside',airside_lager:'t-al'}[o.type]||'t-lager';
  const preview=o.items.slice(0,2).map(i=>`${i.item||i.name}: ${i.qty}`).join(' · ');
  return `<div class="card">
    <div class="card-top">
      <div>
        <div class="card-name">${o.orderer}</div>
        <div class="card-date">${o.date}</div>
        <div class="type-tag ${typeClass}">${typeMap[o.type]||o.type}</div>
      </div>
      <span class="badge ${sc}">${sl}</span>
    </div>
    <div style="font-size:12px;color:#94a3b8;margin-top:4px;">${preview}</div>
  </div>`;
}

// ─── ARTICLES ────────────────────────────────────────────
function setArticleFilter(f){
  articleFilter=f;
  ['all','lager','airside','al'].forEach(k=>{
    document.getElementById('fa-'+k)?.classList.toggle('on',k===f||(k==='al'&&f==='airside_lager'));
  });
  renderArticles();
}

function renderArticles(){
  const el=document.getElementById('articles-list');
  let filtered=allArticles;
  if(articleFilter!=='all') filtered=allArticles.filter(a=>a.type===articleFilter);
  
  if(!filtered.length){el.innerHTML='<div class="empty">📦 Keine Artikel</div>';return;}
  
  const sections={};
  filtered.forEach(a=>{
    const key=`${a.type}::${a.section}`;
    if(!sections[key]) sections[key]={type:a.type,section:a.section,items:[]};
    sections[key].items.push(a);
  });
  
  el.innerHTML=Object.values(sections).map(s=>`
    <div class="art-section">
      <div class="art-section-head">${s.section} <span style="font-size:10px;opacity:0.7;">${s.type}</span></div>
      ${s.items.map(a=>`<div class="art-row">
        ${a.image_url?`<img class="art-img" src="${a.image_url}">`:'<div class="art-ph">🖼️</div>'}
        <div style="flex:1;min-width:0;">
          <div class="art-name">${a.name}</div>
          <div class="art-unit">${a.unit}</div>
        </div>
        <label style="background:#dbeafe;color:#1d4ed8;border:none;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;">📷<input type="file" accept="image/*" style="display:none;" onchange="uploadImgDash(this,${a.id})"/></label>
        <button onclick="editArticleDash(${a.id},this.dataset.name,this.dataset.unit)" data-name="${a.name}" data-unit="${a.unit}" style="background:#e0e7ff;color:#3730a3;border:none;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;">✏️</button>

const OWNER_PHONE = "491743822643";
let alertedOrders = new Set();
let supabaseAlerted = false;

function checkAlerts(){
  const now = Date.now();
  const oneHour = 60 * 60 * 1000;
  
  // Check for orders open longer than 1 hour
  allOrders.forEach(o=>{
    if(['angekommen','fehler'].includes(o.status)) return;
    if(alertedOrders.has(o.id)) return;
    const created = new Date(o.created_at).getTime();
    if(now - created > oneHour){
      alertedOrders.add(o.id);
      const msg = `⚠️ *OFFENE BESTELLUNG SEIT 1 STUNDE*\n━━━━━━━━━━━━━━━━━━━━\n👤 ${o.orderer}\n📅 ${o.date}\n📦 ${o.type}\n\nBitte prüfen!`;

  });
}

function checkSupabase(){
  api("GET","orders","?limit=1").then(data=>{
    if(data===null && !supabaseAlerted){
      supabaseAlerted = true;
      const msg = `🔴 *SYSTEM FEHLER*\n━━━━━━━━━━━━━━━━━━━━\nSupabase ist nicht erreichbar!\nBitte sofort prüfen.`;
      window.open(`https://wa.me/${OWNER_PHONE}?text=${encodeURIComponent(msg)}`,'_blank');
      showAlert('🔴 Supabase nicht erreichbar!','red');
    } else if(data !== null){
      supabaseAlerted = false;
    }
  });
}

function showAlert(msg, type){
  const colors = {red:'#dc2626', orange:'#f59e0b', green:'#16a34a'};
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:0;left:0;right:0;background:${colors[type]||colors.orange};color:white;padding:12px 16px;font-size:13px;font-weight:700;z-index:500;text-align:center;`;
  el.textContent = msg;
  document.body.prepend(el);
  setTimeout(()=>el.remove(), 10000);
}

// ─── STATUS CHECK ────────────────────────────────────────
async function checkStatus(){
  const now = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  
  // Check DB
  setStatus('db','checking','Prüfe...');
  const orders = await api("GET","orders","?limit=1");
  if(orders!==null){
    setStatus('db','green',`Online · ${now}`);
  } else {
    setStatus('db','red','❌ Nicht erreichbar!');
    if(!dbErrorSince) dbErrorSince=Date.now();
    if(!dbAlertSent&&Date.now()-dbErrorSince>30000){
      dbAlertSent=true;
      sendOwnerAlert('🔴 *SYSTEM FEHLER*\nSupabase nicht erreichbar!\nBitte sofort prüfen.');
    }
  }

  // Check orders table
  const ordersCount = await api("GET","orders","?select=id");
  if(ordersCount!==null){
    setStatus('orders','green',`${ordersCount.length} Bestellungen`);
  } else {
    setStatus('orders','red','❌ Fehler!');
  }

  // Check articles table
  const articlesCount = await api("GET","articles","?select=id");
  if(articlesCount!==null){
    setStatus('articles','green',`${articlesCount.length} Artikel`);
  } else {
    setStatus('articles','red','❌ Fehler!');
  }

  // Netlify - just check if page loaded
  setStatus('netlify','green',`Online · ${now}`);
}

function setStatus(name, state, text){
  const dot = document.getElementById('status-dot-'+name);
  const label = document.getElementById('status-text-'+name);
  if(dot){ dot.className='status-dot '+state; }
  if(label){ label.textContent=text; }
}

function searchArticlesDash(q){
  if(!q){ renderArticles(); return; }
  const ql=q.toLowerCase();
  const el=document.getElementById('articles-list');
  const filtered=allArticles.filter(a=>
    a.name.toLowerCase().includes(ql)||
    (a.section&&a.section.toLowerCase().includes(ql))
  );
  if(!filtered.length){el.innerHTML='<div class="empty">Nicht gefunden</div>';return;}
  const sections={};
  filtered.forEach(a=>{
    const key=a.type+'::'+a.section;
    if(!sections[key]) sections[key]={type:a.type,section:a.section,items:[]};
    sections[key].items.push(a);
  });
  el.innerHTML=Object.values(sections).map(s=>`
    <div class="art-section">
      <div class="art-section-head">${s.section} <span style="font-size:10px;opacity:0.7;">${s.type}</span></div>

        <div style="flex:1;min-width:0;"><div class="art-name">${a.name}</div><div class="art-unit">${a.unit}</div></div>

async function editArticleDash(id, name, unit){
  const newName=prompt('Name:', name);
  if(!newName) return;
  const newUnit=prompt('Einheit:', unit);
  if(!newUnit) return;
  await api("PATCH","articles","?id=eq."+id,{name:newName,unit:newUnit});
  const a=allArticles.find(x=>x.id===id);
  if(a){a.name=newName;a.unit=newUnit;}
  renderArticles();
}

// ─── DELIVERY TIMES ──────────────────────────────────────
function calcDeliveryTimes(doneOrders){
  const el=document.getElementById('delivery-stats');
  if(!el) return;
  
  if(!doneOrders.length){
    el.style.display='none';
    return;
  }
  
  // Calculate minutes from created_at to status_time
  const times=[];
  doneOrders.forEach(o=>{
    if(!o.created_at||!o.status_time) return;
    try{
      const created=new Date(o.created_at).getTime();
      // Parse status_time "18.05.2026, 14:32"
      const parts=o.status_time.split(', ');
      if(parts.length<2) return;
      const dateParts=parts[0].split('.');
      const timeParts=parts[1].split(':');
      const done=new Date(dateParts[2],dateParts[1]-1,dateParts[0],timeParts[0],timeParts[1]).getTime();
      const mins=Math.round((done-created)/60000);
      if(mins>0&&mins<300) times.push(mins);
    }catch(e){}
  });
  
  if(!times.length){el.style.display='none';return;}
  
  el.style.display='block';
  const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);
  const min=Math.min(...times);
  const max=Math.max(...times);
  
  document.getElementById('del-avg').textContent=avg+' Min';
  document.getElementById('del-avg').className='delivery-val '+(avg<15?'good':avg<30?'warn':'bad');
  document.getElementById('del-min').textContent=min+' Min';
  document.getElementById('del-max').textContent=max+' Min';
  document.getElementById('del-count').textContent=doneOrders.length+' Bestellungen';
}
