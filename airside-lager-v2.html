<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#1e1b4b"/>
<title>✈️ Airside → Lager</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
/* ═════════════════════════════════════════════════════════════════
   DESIGN TOKENS – Eine einzige Quelle der Wahrheit für ALLE Farben.
   Ändere hier was, ändert sich überall. Auch Dark Mode liegt hier.
   ═════════════════════════════════════════════════════════════════ */
:root {
  /* Brand */
  --brand-primary:   #14532d;
  --brand-secondary: #16a34a;
  --brand-accent:    #1e1b4b;

  /* Surface */
  --bg-page:    #f0f4fa;
  --bg-card:    #ffffff;
  --bg-soft:    #f8fafc;
  --bg-input:   #ffffff;

  /* Text */
  --text-primary:   #0f172a;
  --text-secondary: #64748b;
  --text-muted:     #94a3b8;
  --text-inverse:   #ffffff;

  /* Borders */
  --border:        #e2e8f0;
  --border-focus:  #16a34a;

  /* Status */
  --status-success: #16a34a;
  --status-warn:    #f59e0b;
  --status-error:   #dc2626;
  --status-info:    #2563eb;

  /* Soft tints */
  --tint-success: #f0fdf4;
  --tint-warn:    #fef9c3;
  --tint-error:   #fee2e2;
  --tint-info:    #dbeafe;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.4);

  /* Radii */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-pill: 999px;

  /* Animation */
  --t-fast: 0.15s ease;
  --t-base: 0.25s ease;
  --t-slow: 0.4s ease;
}

/* Dark Mode – ein Schalter, ALLES ändert sich automatisch */
body.dark {
  --bg-page:        #0f172a;
  --bg-card:        #1e293b;
  --bg-soft:        #0f172a;
  --bg-input:       #1e293b;
  --text-primary:   #f1f5f9;
  --text-secondary: #94a3b8;
  --border:         #334155;
  --tint-success:   rgba(22,163,74,0.15);
  --tint-warn:      rgba(245,158,11,0.15);
  --tint-error:     rgba(220,38,38,0.15);
  --tint-info:      rgba(37,99,235,0.15);
}

/* ═════════════════════════════════════════════════════════════════
   RESET & BASE
   ═════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', system-ui, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  transition: background var(--t-base), color var(--t-base);
}

button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* ═════════════════════════════════════════════════════════════════
   ANIMATIONS
   ═════════════════════════════════════════════════════════════════ */
@keyframes toastIn  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { to { opacity:0; transform:translateY(20px); } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp  { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes shimmer  { 0% { background-position:-400px 0; } 100% { background-position:400px 0; } }

.skeleton {
  background: linear-gradient(90deg, var(--bg-soft) 25%, var(--border) 50%, var(--bg-soft) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--r-md);
}

/* ═════════════════════════════════════════════════════════════════
   LOGIN OVERLAY
   ═════════════════════════════════════════════════════════════════ */
.login-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  animation: fadeIn var(--t-slow);
}
.login-box {
  background: white;
  border-radius: 20px;
  padding: 36px 28px;
  width: 100%; max-width: 380px;
  box-shadow: var(--shadow-lg);
}
.login-title { font-size: 22px; font-weight: 800; color: var(--brand-accent); text-align: center; margin-bottom: 6px; }
.login-sub   { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 24px; }
.login-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  font-size: 16px;
  outline: none;
  margin-bottom: 12px;
  transition: border-color var(--t-fast);
}
.login-input:focus { border-color: var(--border-focus); }
.login-btn {
  width: 100%;
  background: var(--brand-primary);
  color: var(--text-inverse);
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 16px;
  font-weight: 800;
  transition: opacity var(--t-fast);
}
.login-btn:hover { opacity: 0.9; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-err { color: var(--status-error); font-size: 13px; text-align: center; margin-top: 8px; min-height: 18px; }

/* ═════════════════════════════════════════════════════════════════
   HEADER
   ═════════════════════════════════════════════════════════════════ */
.header {
  background: linear-gradient(135deg, var(--brand-accent), #3730a3, #4f46e5);
  padding: 28px 20px 20px;
  color: var(--text-inverse);
  text-align: center;
  position: sticky; top: 0;
  z-index: 75;
}
.header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.header .sub { font-size: 13px; color: rgba(255,255,255,0.75); }

/* ═════════════════════════════════════════════════════════════════
   TABS
   ═════════════════════════════════════════════════════════════════ */
.tabs {
  display: flex;
  background: var(--bg-card);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 0;
  z-index: 50;
}
.tab {
  flex: 1;
  padding: 13px 8px;
  text-align: center;
  font-size: 13px; font-weight: 700;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color var(--t-fast), border-color var(--t-fast);
  background: none; border-left: none; border-right: none; border-top: none;
}
.tab.on { color: var(--brand-secondary); border-bottom-color: var(--brand-secondary); }

.page { display: none; }
.page.on { display: block; animation: fadeIn var(--t-base); }
.wrap { max-width: 540px; margin: 0 auto; padding: 16px 16px 120px; }

/* ═════════════════════════════════════════════════════════════════
   CARDS
   ═════════════════════════════════════════════════════════════════ */
.card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 16px;
  margin-bottom: 14px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.lbl {
  font-size: 11px; font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

/* ═════════════════════════════════════════════════════════════════
   INPUTS (alle gleich gestylt)
   ═════════════════════════════════════════════════════════════════ */
input[type=text], input[type=tel], input[type=email],
input[type=password], textarea, select {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  font-size: 15px;
  background: var(--bg-input);
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--t-fast);
}
input:focus, textarea:focus, select:focus { border-color: var(--border-focus); }
textarea { min-height: 70px; resize: vertical; }

/* ═════════════════════════════════════════════════════════════════
   BUTTONS (eine Klasse, viele Varianten)
   ═════════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center; justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  border: none;
  border-radius: var(--r-sm);
  font-size: 14px; font-weight: 700;
  transition: opacity var(--t-fast), transform var(--t-fast);
}
.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.98); }
.btn-primary    { background: var(--brand-primary); color: var(--text-inverse); }
.btn-secondary  { background: var(--bg-soft); color: var(--text-primary); border: 1.5px solid var(--border); }
.btn-success    { background: var(--brand-secondary); color: var(--text-inverse); }
.btn-danger     { background: var(--tint-error); color: var(--status-error); }
.btn-warning    { background: var(--tint-warn); color: #92400e; }
.btn-sm         { padding: 6px 12px; font-size: 12px; }
.btn-icon       { width: 34px; height: 34px; padding: 0; border-radius: 50%; }
.btn-block      { width: 100%; }

/* ═════════════════════════════════════════════════════════════════
   CONTACTS
   ═════════════════════════════════════════════════════════════════ */
.contact-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color var(--t-fast), background var(--t-fast);
}
.contact-item.on { border-color: var(--brand-secondary); background: var(--tint-info); }
.chk {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--text-muted);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--t-fast);
}
.contact-item.on .chk { background: var(--brand-secondary); border-color: var(--brand-secondary); }
.chk-dot { width: 8px; height: 8px; background: white; border-radius: 50%; display: none; }
.contact-item.on .chk-dot { display: block; }
.cname  { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.cphone { font-size: 12px; color: var(--text-secondary); }

/* Recipient collapse */
.recipient-header {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.recipient-body { overflow: hidden; transition: max-height var(--t-base); max-height: 600px; }
.recipient-body.collapsed { max-height: 0; }
.recipient-summary {
  display: none;
  font-size: 12px; color: var(--brand-secondary);
  font-weight: 700;
  margin-top: 6px;
}

/* ═════════════════════════════════════════════════════════════════
   ARTICLE SECTIONS
   ═════════════════════════════════════════════════════════════════ */
.section-head {
  background: var(--brand-primary);
  color: var(--text-inverse);
  padding: 10px 16px;
  border-radius: var(--r-md) var(--r-md) 0 0;
  font-size: 13px; font-weight: 700;
  margin-top: 8px;
}
.section-body {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--r-md) var(--r-md);
  margin-bottom: 4px;
  overflow: hidden;
}

.article-row {
  display: flex; align-items: center;
  padding: 12px 14px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.article-row:last-child { border-bottom: none; }
.article-img {
  width: 52px; height: 52px;
  border-radius: var(--r-md);
  object-fit: cover;
  flex-shrink: 0;
}
.article-img-placeholder {
  width: 52px; height: 52px;
  border-radius: var(--r-md);
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.article-info { flex: 1; min-width: 0; }
.article-name { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
.article-unit { font-size: 12px; color: var(--text-secondary); }

/* Quantity Stepper */
.qty-stepper { display: flex; flex-direction: column; align-items: center; width: 44px; flex-shrink: 0; }
.qty-btn {
  width: 34px; height: 26px;
  border: none; background: transparent;
  font-size: 20px;
  color: var(--text-secondary);
}
.qty-input {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: transparent;
  border: 2px solid var(--text-muted);
  text-align: center;
  font-size: 14px; font-weight: 800;
  color: var(--text-muted);
  outline: none;
  transition: all var(--t-fast);
}
.qty-input.active {
  background: var(--brand-secondary);
  border-color: var(--brand-secondary);
  color: white;
}

/* ═════════════════════════════════════════════════════════════════
   SEARCH
   ═════════════════════════════════════════════════════════════════ */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-input {
  padding-right: 36px;
}
.search-clear {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  font-size: 16px;
  color: var(--text-muted);
  display: none;
}

/* ═════════════════════════════════════════════════════════════════
   CART
   ═════════════════════════════════════════════════════════════════ */
.cart-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  z-index: 60;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.cart-btn {
  width: 100%;
  background: var(--brand-secondary);
  color: white;
  border: none;
  border-radius: var(--r-md);
  padding: 14px 20px;
  font-size: 15px; font-weight: 800;
  display: flex; align-items: center; justify-content: space-between;
  transition: opacity var(--t-fast);
}
.cart-btn:disabled { opacity: 0.5; }
.cart-badge {
  background: white;
  color: var(--brand-secondary);
  padding: 4px 10px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 800;
}

/* Cart Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  display: none;
  align-items: flex-end;
}
.modal-overlay.on { display: flex; animation: fadeIn var(--t-base); }
.modal-sheet {
  background: var(--bg-card);
  width: 100%;
  border-radius: 20px 20px 0 0;
  padding: 20px 16px 24px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp var(--t-base);
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}

/* ═════════════════════════════════════════════════════════════════
   ORDER LIST
   ═════════════════════════════════════════════════════════════════ */
.order-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: 10px;
  overflow: hidden;
}
.order-head {
  padding: 12px 14px;
  cursor: pointer;
}
.order-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.order-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.order-status {
  font-size: 11px; font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--r-pill);
}
.order-status.green  { background: var(--tint-success); color: var(--status-success); }
.order-status.orange { background: var(--tint-warn);    color: var(--status-warn); }
.order-status.red    { background: var(--tint-error);   color: var(--status-error); }
.order-status.blue   { background: var(--tint-info);    color: var(--status-info); }

.order-body {
  display: none;
  padding: 0 14px 12px;
  border-top: 1px solid var(--border);
}
.order-body.on { display: block; }
.item-pill {
  display: inline-block;
  background: var(--bg-soft);
  border-radius: var(--r-sm);
  padding: 2px 8px;
  margin: 2px;
  font-size: 12px;
  color: var(--text-primary);
}

/* ═════════════════════════════════════════════════════════════════
   FLOATING BUTTONS
   ═════════════════════════════════════════════════════════════════ */
.fab {
  position: fixed; top: 20px; right: 16px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--text-primary);
  color: var(--text-inverse);
  border: none;
  font-size: 20px;
  box-shadow: var(--shadow-md);
  z-index: 70;
}
.dark-btn {
  position: fixed; top: 20px; left: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  color: var(--text-inverse);
  border: 1px solid rgba(255,255,255,0.3);
  font-size: 16px;
  z-index: 70;
}

/* ═════════════════════════════════════════════════════════════════
   EMPTY STATES & LOADING
   ═════════════════════════════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .title { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--text-secondary); }
.empty-state .desc { font-size: 13px; }

.loading-skeleton {
  display: flex; align-items: center; gap: 12px;
  padding: 14px;
}
.loading-skeleton .skel-img { width: 52px; height: 52px; }
.loading-skeleton .skel-text { flex: 1; height: 14px; }

/* ═════════════════════════════════════════════════════════════════
   OFFLINE BAR
   ═════════════════════════════════════════════════════════════════ */
.offline-bar {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--status-error);
  color: white;
  text-align: center;
  padding: 8px;
  font-size: 13px; font-weight: 700;
  z-index: 200;
  display: none;
}
.offline-bar.on { display: block; }
</style>
</head>
<body>

<!-- ═════════════════════════════════════════════════════════════════
     LOGIN SCREEN
     Wird sichtbar wenn User nicht eingeloggt ist.
     ═════════════════════════════════════════════════════════════════ -->
<div class="login-overlay" id="login-screen">
  <div class="login-box">
    <div style="text-align:center;font-size:42px;margin-bottom:12px;">✈️</div>
    <div class="login-title">Bona'me × Lagardère</div>
    <div class="login-sub">Airside → Lager Bestellsystem</div>
    <input type="email" class="login-input" id="login-email" placeholder="Email" autocomplete="email"/>
    <input type="password" class="login-input" id="login-password" placeholder="Passwort" autocomplete="current-password"/>
    <button class="login-btn" id="login-submit-btn">🔐 Anmelden</button>
    <div class="login-err" id="login-error"></div>
  </div>
</div>

<!-- Offline indicator -->
<div class="offline-bar" id="offline-bar">📡 Offline – Änderungen werden nicht gespeichert</div>

<!-- ═════════════════════════════════════════════════════════════════
     MAIN APP
     ═════════════════════════════════════════════════════════════════ -->
<div id="main-wrap" style="display:none;">

  <!-- Header -->
  <header class="header">
    <h1>✈️ Airside → Lager</h1>
    <div class="sub">bona'me × Lagardère · Düsseldorf</div>
  </header>

  <!-- Floating action buttons -->
  <button class="dark-btn" id="dark-btn" aria-label="Dark Mode umschalten">🌙</button>
  <button class="fab" id="admin-btn" aria-label="Admin">⚙️</button>

  <!-- Tabs -->
  <nav class="tabs">
    <button class="tab on" id="tab-order"   data-tab="order">🛒 Bestellen</button>
    <button class="tab"    id="tab-history" data-tab="history">📋 Verlauf</button>
    <button class="tab"    id="tab-stats"   data-tab="stats" style="display:none;">📊 Statistik</button>
  </nav>

  <!-- ─── Page: Order ─── -->
  <section class="page on" id="page-order">
    <div class="wrap">

      <!-- Orderer name -->
      <div class="card">
        <label class="lbl">Dein Name</label>
        <input type="text" id="orderer-name" placeholder="z.B. Mustafa"/>
      </div>

      <!-- Recipients -->
      <div class="card">
        <div class="recipient-header" id="recipient-toggle">
          <div>
            <div class="lbl" style="margin-bottom:2px;">Empfänger</div>
            <div class="recipient-summary" id="recipient-summary"></div>
          </div>
          <span id="recipient-arrow" style="font-size:14px;">▼</span>
        </div>
        <div class="recipient-body" id="recipient-body">
          <div id="contact-list" style="margin-top:10px;"></div>
          <button class="btn btn-secondary btn-sm" id="add-contact-toggle" style="margin-top:6px;">＋ Kontakt hinzufügen</button>
          <div id="add-contact-form" style="display:none;background:var(--bg-soft);padding:12px;border-radius:10px;margin-top:10px;">
            <input type="text" id="new-contact-name" placeholder="Name" style="margin-bottom:8px;"/>
            <input type="tel" id="new-contact-phone" placeholder="Telefonnummer (mit Ländercode)" style="margin-bottom:8px;"/>
            <button class="btn btn-primary btn-block" id="save-contact-btn">Speichern</button>
          </div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <input type="text" class="search-input" id="search-input" placeholder="🔍 Artikel suchen..."/>
        <button class="search-clear" id="search-clear-btn">✕</button>
      </div>

      <!-- Articles -->
      <div id="article-list">
        <!-- Loading skeleton -->
        <div class="card">
          <div class="loading-skeleton"><div class="skeleton skel-img"></div><div class="skeleton skel-text"></div></div>
          <div class="loading-skeleton"><div class="skeleton skel-img"></div><div class="skeleton skel-text"></div></div>
          <div class="loading-skeleton"><div class="skeleton skel-img"></div><div class="skeleton skel-text"></div></div>
        </div>
      </div>

      <!-- Note -->
      <div class="card">
        <label class="lbl">Notiz (optional)</label>
        <textarea id="order-note" placeholder="Zusätzliche Hinweise..."></textarea>
      </div>

    </div>
  </section>

  <!-- ─── Page: History ─── -->
  <section class="page" id="page-history">
    <div class="wrap">
      <div id="order-list">
        <div class="empty-state"><div class="icon">⏳</div><div class="title">Lädt...</div></div>
      </div>
    </div>
  </section>

  <!-- ─── Page: Stats (Admin) ─── -->
  <section class="page" id="page-stats">
    <div class="wrap">
      <div id="stats-content">
        <div class="empty-state"><div class="icon">📊</div><div class="title">Statistik wird geladen...</div></div>
      </div>
    </div>
  </section>

  <!-- Cart Bar -->
  <div class="cart-bar">
    <button class="cart-btn" id="cart-btn" disabled>
      <span>🛒 Warenkorb anzeigen</span>
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>

  <!-- Cart Modal -->
  <div class="modal-overlay" id="cart-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:18px;font-weight:800;">🛒 Warenkorb</div>
        <button class="btn btn-secondary btn-icon" id="cart-close-btn">✕</button>
      </div>
      <div id="cart-items"></div>
      <button class="btn btn-success btn-block" id="send-order-btn" style="margin-top:16px;padding:14px;font-size:15px;">
        📤 Bestellung senden
      </button>
    </div>
  </div>

</div>
